services:
  - type: web
    name: udhaar
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: udhaar-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: udhaar-db
    plan: free
